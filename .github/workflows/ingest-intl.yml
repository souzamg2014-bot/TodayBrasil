name: Ingest internacional (Mundo)

on:
  schedule:
    - cron: "20 * * * *" # de hora em hora (min 20, p/ evitar pico do :00)
  workflow_dispatch: {}

jobs:
  ingest-intl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: node scripts/ingest-news.mjs
        env:
          FEED_SET: intl
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

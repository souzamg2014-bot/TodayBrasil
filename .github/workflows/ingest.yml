name: Ingest news

on:
  # Horarios em UTC. Comercial = seg-sex 08h-18h BRT = 11h-21h UTC.
  schedule:
    - cron: "*/10 11-21 * * 1-5"   # comercial: a cada 10 min (seg-sex, 08h-18h BRT)
    - cron: "0 0-10,22,23 * * 1-5" # dias uteis fora do comercial: de hora em hora
    - cron: "0 * * * 0,6"          # fins de semana: de hora em hora
  workflow_dispatch: {} # permite rodar na mao pelo painel do GitHub

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: node scripts/ingest-news.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FEED_SET: all # Brasil (pt) + Mundo (intl, por pais)
      # Auditoria de conteudo (rede de seguranca): apaga qualquer lixo
      # (publieditorial/promo) que tenha escapado, ANTES de virar feed/alerta.
      # A ingestao ja barra na entrada; aqui limpa o que entrou nos ultimos 120 min.
      - run: node scripts/audit-content.mjs --purge
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUDIT_SINCE_MIN: "120"
      # Central de Alertas: cruza as noticias recem-coletadas com as regras dos
      # usuarios e gera notificacoes. Web Push so dispara se as chaves VAPID
      # estiverem nos secrets (senao, fica so na central in-app).
      - run: node scripts/match-alerts.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}

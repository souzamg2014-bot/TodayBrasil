name: Ingest DataJud (Movimento Falimentar)

on:
  schedule:
    - cron: "0 23 * * *" # 1x ao dia, 23:00 UTC (20:00 BRT)
  workflow_dispatch: {}

jobs:
  ingest-datajud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: node scripts/ingest-datajud.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATAJUD_UFS: "sp,rj,mg,rs,pr"
